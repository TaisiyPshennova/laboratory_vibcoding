<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CV студента, изучающего C++">
    <meta property="og:title" content="CV - Пшеннова Таисия">
    <meta property="og:description" content="Резюме начинающего C++ разработчика">
    <title>CV | Твоё Имя</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <span class="btn close"></span>
            <span class="btn minimize"></span>
            <span class="btn maximize"></span>
            <span class="title">terminal — тася@cv: ~</span>
        </div>
        <div class="terminal-body" id="terminalBody">
            <div class="output" id="output">
                <p class="line"><span class="prompt">$</span> <span class="cmd">cat welcome.txt</span></p>
                <p class="line typewriter" id="welcomeText"></p>
                <p class="line hint">Введи <span class="cmd">help</span> для списка команд</p>
            </div>
            <div class="input-line">
                <span class="prompt">$</span>
                <input type="text" id="cmdInput" autofocus autocomplete="off" aria-label="Командная строка">
            </div>
        </div>
    </div>
    <footer>
        <p>© <span id="year"></span> Тася. Сделано с ❤️ и C++</p>
    </footer>
    <button id="scrollTopBtn" title="Наверх" aria-label="Прокрутить вверх">↑</button>
    <script src="src/main.js"></script>
</body>
</html>
